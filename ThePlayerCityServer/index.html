<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ThePlayerCity</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Outfit:wght@500;800&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app">
        <div id="game-container">
            <canvas id="gameCanvas"></canvas>
            
            <div id="ui-layer">
                <div id="hud">
                    <div class="stat-bar health">
                        <div class="bar-fill" id="hp-bar"></div>
                        <span class="label">HP</span>
                    </div>
                    <div id="player-name">Player Name</div>
                    <div id="stats-panel">
                        <div>LVL: 1</div>
                        <div>XP: 0 / 100</div>
                    </div>
                </div>

                <div id="inventory-container">
                    <div class="panel-header">INVENTORY</div>
                    <div id="inventory-grid">
                        <!-- Items will be injected here -->
                        <div class="inv-slot empty"></div>
                        <div class="inv-slot empty"></div>
                        <div class="inv-slot empty"></div>
                        <div class="inv-slot empty"></div>
                        <div class="inv-slot empty"></div>
                        <div class="inv-slot empty"></div>
                        <div class="inv-slot empty"></div>
                        <div class="inv-slot empty"></div>
                    </div>
                </div>

                <div id="chat-container">
                    <div id="chat-log"></div>
                    <input type="text" id="chat-input" placeholder="Press Enter to chat...">
                </div>
                
                <div id="coords">X: 0, Y: 0</div>
            </div>

            <div id="overlay" class="visible">
                <div class="modal">
                    <h1>ThePlayerCity</h1>
                    <p>Enter your character name to begin</p>
                    <input type="text" id="username-input" placeholder="Character Name...">
                    <button id="start-btn" disabled>LOADING WORLD...</button>
                </div>
            </div>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
